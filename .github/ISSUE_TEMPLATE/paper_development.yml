name: Paper Development
description: Draft or revise a section of the project paper
labels: ["paper"]
body:
  - type: textarea
    attributes:
      label: Objective
      description: What section or content will be drafted or revised?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Description
      description: Provide a concise overview of the task, context, and scope.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance Criteria
      description: How will completion be verified?
    validations:
      required: true
  - type: input
    attributes:
      label: Estimated Effort
      description: Estimated time (hours)
    validations:
      required: true