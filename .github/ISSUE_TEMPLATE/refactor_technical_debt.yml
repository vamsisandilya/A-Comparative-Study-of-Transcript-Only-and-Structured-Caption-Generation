name: Refactor / Technical Debt
description: Improve code quality, structure, or maintainability
labels: ["refactor"]
body:
  - type: textarea
    attributes:
      label: Objective
      description: What will be improved or cleaned up?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Description
      description: Provide a concise overview of the task, context, and scope.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance Criteria
      description: How will improvement be verified?
    validations:
      required: true
  - type: input
    attributes:
      label: Estimated Effort
      description: Estimated time (hours)
    validations:
      required: true
