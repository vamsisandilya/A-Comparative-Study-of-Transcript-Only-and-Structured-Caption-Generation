name: Research / Technology Evaluation
description: Investigate tools, frameworks, techniques, or feasibility
labels: ["research"]
body:
  - type: textarea
    attributes:
      label: Objective
      description: What is being evaluated or investigated?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Description
      description: Provide a concise overview of the task, context, and scope.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Evaluation Criteria
      description: How will options be compared or assessed?
    validations:
      required: true
  - type: input
    attributes:
      label: Estimated Effort
      description: Estimated time (hours)
    validations:
      required: true
