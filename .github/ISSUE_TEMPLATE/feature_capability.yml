name: Feature / Capability
description: Track implementation or prototyping of system functionality
labels: ["feature"]
body:
  - type: textarea
    attributes:
      label: Objective
      description: What will be accomplished?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Description
      description: Provide a concise overview of the task, context, and scope.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance Criteria
      description: How will completion be verified?
    validations:
      required: true
  - type: input
    attributes:
      label: Estimated Effort
      description: Estimated time (hours)
    validations:
      required: true

